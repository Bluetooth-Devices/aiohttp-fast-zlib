name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"
  UV_PYTHON_PREFERENCE: only-managed # avoid ancient system Python

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: pre-commit/action@v3.0.1

  # Make sure the PR title follows the conventional commits convention:
  # https://www.conventionalcommits.org
  # PRs are squash-merged, so the PR title becomes the commit on main and
  # drives python-semantic-release's version bump.
  pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with a lowercase character.

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        os:
          - ubuntu-latest
          - windows-latest
          - macOS-latest
        aiohttp_version:
          - "3.10.11" # Latest 3.10.x
          - "3.11.18" # Latest 3.11.x
          - "latest" # Latest version (3.12+)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          allow-prereleases: true
      - name: Cache poetry venv
        id: cache-venv
        uses: actions/cache@v6.1.0
        with:
          path: .venv
          key: venv-v1-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-aiohttp${{ matrix.aiohttp_version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
      - name: Install Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --all-extras
        shell: bash
      - name: "Install specific aiohttp version"
        if: steps.cache-venv.outputs.cache-hit != 'true' && matrix.aiohttp_version != 'latest'
        run: poetry add "aiohttp==${{ matrix.aiohttp_version }}"
        shell: bash
      - name: Test with Pytest
        run: poetry run pytest --cov-report=xml
        shell: bash
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Dry run on PRs and non-main pushes. No environment, no publish
  # permissions, no OIDC, so PR runs carry no release blast radius.
  release-dry-run:
    needs:
      - test
      - lint
    if: github.ref_name != 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - name: Create local branch name
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: git switch -C "$BRANCH"
      - name: Test release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          no_operation_mode: true

  # Real release, only on main. The release environment and write/OIDC
  # permissions are scoped to this job so they never apply to PR runs.
  release:
    needs:
      - test
      - lint
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: release-${{ github.ref }}
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - name: Create local branch name
        env:
          BRANCH: ${{ github.ref_name }}
        run: git switch -C "$BRANCH"

      # On main branch: actual PSR + upload to PyPI & GitHub
      - name: Release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        id: release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.release.outputs.released == 'true'

      - name: Publish package distributions to GitHub Releases
        uses: python-semantic-release/upload-to-gh-release@main
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
